# =====================================================================
# 프로젝트 설정 파일 (config.yaml)
# 작성자: 안성민 (광주 4반)
# 작성일: 2026-07-21
# 설명: 모든 파일 경로 및 프로젝트 설정을 중앙화 관리합니다.
#      환경변수 PROJECT_DIR을 우선 적용, 없으면 상대경로 사용
# =====================================================================

# 프로젝트 기본 경로 설정
project:
  # 기본 디렉토리 (PROJECT_DIR 환경변수가 없으면 스크립트 실행 디렉토리 기준)
  use_env_var: true  # 환경변수 PROJECT_DIR 사용 여부
  default_base_dir: "."

# =====================================================================
# 데이터 경로 (Data Paths)
# =====================================================================
data:
  raw:
    sales_100k: "data/raw/sales_100k.csv"
    python_practice1: "data/raw/Python_Practice1_Data.json"
    python_practice2: "data/raw/Python_Practice2_Data.json"
  
  processed:
    sales_clean: "data/processed/sales_clean.csv"
    sales_groupby_summary: "data/processed/sales_groupby_summary.csv"
    valid_records: "data/processed/valid_records.csv"
    valid_phase1: "data/processed/valid_phase1.csv"
    error_records: "data/processed/error_records.json"
    errors_phase1: "data/processed/errors_phase1.json"
    eval_dataset: "data/processed/eval_dataset.json"

# =====================================================================
# 출력 경로 (Output Paths)
# =====================================================================
output:
  plots:
    eda_subplots: "outputs/eda_subplots.png"
    eda_interactive: "outputs/sales_region_category.html"
  
  models:
    sales_pipeline: "models/sales_pipeline.joblib"

# =====================================================================
# 로깅 설정 (Logging Configuration)
# =====================================================================
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  log_dir: "logs"
  log_file: "logs/pipeline_execution.log"
  format: "%(asctime)s [%(levelname)s] %(funcName)s:%(lineno)d - %(message)s"
  date_format: "%H:%M:%S"
  console_output: true
  file_output: true

# =====================================================================
# 파일 읽기 설정 (File Reading Configuration)
# =====================================================================
file_reading:
  # CSV 파일 읽기 옵션
  csv:
    default_encoding: "utf-8"
    fallback_encodings:
      - "cp949"      # Windows Korean
      - "euc-kr"     # Korean
      - "latin-1"    # Default fallback
    encoding_retry: true  # 인코딩 실패 시 재시도 여부
    detect_engine: "python"  # 또는 "c"
    chunk_size: null  # null이면 전체 로드, 크면 청크 단위 로드
  
  # JSON 파일 읽기 옵션
  json:
    encoding: "utf-8"
    fallback_encodings:
      - "cp949"
      - "euc-kr"
    encoding_retry: true
  
  # Excel 파일 읽기 옵션
  excel:
    sheet_name: 0  # 기본 첫 번째 시트, 또는 시트명 문자열
    engine: "openpyxl"  # 또는 "xlrd" (xls 확장자)

# =====================================================================
# 머신러닝 모델 설정 (ML Model Configuration)
# =====================================================================
model:
  ridge_regression:
    random_state: 42
    alpha: 1.0
    solver: "auto"
  
  train_test_split:
    test_size: 0.2
    random_state: 42

# =====================================================================
# 시각화 설정 (Visualization Configuration)
# =====================================================================
visualization:
  # 한글 폰트 설정 (macOS, Windows, Linux)
  font_family:
    macos: "AppleGothic"
    windows: "Malgun Gothic"
    linux: "DejaVu Sans"
  
  # 차트 기본 설정
  dpi: 300
  figure_size:
    eda_subplots: [15, 10]
    default: [12, 8]
  
  # 색상 팔레트
  colors:
    primary: "#447adb"      # 파란색
    secondary: "#e54e33"    # 주황색
    palette: "Set2"         # Seaborn 팔레트
